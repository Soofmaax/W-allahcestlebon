name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm install

      - name: Verify site files exist
        run: |
          test -f index.html
          test -f services.html
          test -f gallery.html
          test -f about.html
          test -f contact.html
          test -d assets

      - name: Lint HTML
        run: npm run lint:html

      - name: Lint CSS
        run: npm run lint:css
