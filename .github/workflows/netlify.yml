name: Deploy to Netlify

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install (for lint/debug)
        run: npm install

      - name: Verify site files exist
        run: |
          test -f index.html
          test -f services.html
          test -f gallery.html
          test -f about.html
          test -f contact.html
          test -d assets

      - name: Lint HTML
        run: npm run lint:html

      - name: Lint CSS
        run: npm run lint:css

      - name: Netlify secrets check
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ] || [ -z "$NETLIFY_SITE_ID" ]; then
            echo "NETLIFY_AUTH_TOKEN / NETLIFY_SITE_ID manquants. Le déploiement sera ignoré." 
          else
            echo "Secrets Netlify détectés. Déploiement activé." 
          fi

      - name: Deploy (preview)
        if: github.event_name == 'pull_request' && env.NETLIFY_AUTH_TOKEN != '' && env.NETLIFY_SITE_ID != ''
        uses: netlify/actions/cli@master
        with:
          args: deploy --dir=. --message "PR #${{ github.event.pull_request.number }}"

      - name: Deploy (production)
        if: github.event_name == 'push' && env.NETLIFY_AUTH_TOKEN != '' && env.NETLIFY_SITE_ID != ''
        uses: netlify/actions/cli@master
        with:
          args: deploy --dir=. --prod --message "main @ ${{ github.sha }}"
